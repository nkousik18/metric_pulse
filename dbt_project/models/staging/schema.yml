version: 2

sources:
  - name: raw_data
    database: dev
    schema: raw_data
    description: "Raw data loaded from S3 Brazilian E-Commerce dataset"
    tables:
      - name: orders
        description: "Customer orders with timestamps and status"
        columns:
          - name: order_id
            description: "Unique order identifier"
          - name: customer_id
            description: "Foreign key to customers"
          - name: order_status
            description: "Order status (delivered, shipped, canceled, etc.)"
      - name: order_items
        description: "Line items within each order"
      - name: customers
        description: "Customer demographics and location"
      - name: products
        description: "Product catalog with categories"
      - name: sellers
        description: "Seller information"
      - name: payments
        description: "Payment transactions per order"
      - name: category_translation
        description: "Portuguese to English category mapping"

models:
  - name: stg_orders
    description: "Cleaned orders with date dimensions extracted"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
      - name: order_date
        description: "Date of purchase"
        tests:
          - not_null
      - name: order_status
        description: "Current order status"
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_order_items
    description: "Order line items with calculated total value"
    columns:
      - name: order_id
        description: "Foreign key to orders"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to products"
        tests:
          - not_null
      - name: price
        description: "Item price in BRL"
        tests:
          - not_null
      - name: total_item_value
        description: "Price + freight value"

  - name: stg_customers
    description: "Customer data with location info"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: customer_state
        description: "Brazilian state code"
        tests:
          - not_null

  - name: stg_products
    description: "Products with English category names"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
      - name: product_category
        description: "Product category in English"
